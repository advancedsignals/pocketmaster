<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Opening Telegram...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0; padding:0; background:#f0f2f5; font-family:sans-serif; text-align:center; padding-top:20px;">
  <p>Opening Telegram...</p>
  <p><small style="color:#666;">Please wait</small></p>

  <script>
    // Try to open with deep link first (this often opens directly in app)
    window.location.href = "tg://resolve?domain=pocketmaster";
    
    setTimeout(function() {
      window.location.href = "https://t.me/+xCUSGohcIdAwNmM1";
    }, 200);
    
    // Force close attempts
    setTimeout(function() {
      window.opener = null;
      window.open('', '_self');
      window.close();
    }, 800);
    
    // Last resort - try to navigate away
    setTimeout(function() {
      history.back();
    }, 1500);
  </script>
</body>
</html>
